<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>riot-jsx demo</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, sans-serif;
        max-width: 720px;
        margin: 2rem auto;
        padding: 0 1rem;
        background: #f8f9fa;
        color: #212529;
      }
      h1 { color: #2c3e50; }
      .intro { color: #475569; margin-bottom: 1.5rem; }
      section {
        background: #fff;
        border-radius: 10px;
        padding: 1.25rem 1.5rem;
        margin-bottom: 1.5rem;
        box-shadow: 0 1px 4px rgba(0,0,0,.08);
      }
      section h2 { margin-top: 0; font-size: 1rem; color: #1e293b; }
      .desc { color: #64748b; font-size: 0.9rem; margin-bottom: 1rem; }
      .slider-row {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1rem;
      }
      .slider-row label { font-size: 0.9rem; color: #334155; white-space: nowrap; }
      .slider-row input[type=range] { flex: 1; }
      footer { color: #94a3b8; font-size: 0.85rem; text-align: center; margin-top: 2rem; }

      /* ColorPicker component styles */
      .color-picker {
        border: 2px solid #d97706;
        border-radius: 8px;
        padding: 1rem 1.5rem;
        background: #fefce8;
        display: inline-flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .color-picker .label {
        font-weight: 600;
        color: #92400e;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .color-picker .badge {
        font-size: 0.7rem;
        background: #d97706;
        color: #fff;
        padding: 2px 6px;
        border-radius: 99px;
        letter-spacing: 0.05em;
      }
      .color-picker .desc {
        font-size: 0.85rem;
        color: #78350f;
        margin: 0;
      }
      .swatches {
        display: flex;
        gap: 8px;
      }
      .swatch {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 3px solid transparent;
        cursor: pointer;
        transition: transform 0.1s, border-color 0.1s;
      }
      .swatch:hover { transform: scale(1.15); }
      .swatch.active { border-color: #1e293b; }
      .preview {
        height: 48px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: 700;
        font-size: 0.9rem;
        letter-spacing: 0.05em;
        text-shadow: 0 1px 2px rgba(0,0,0,.4);
        transition: background 0.2s;
      }

      .app { padding-bottom: 2rem; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
